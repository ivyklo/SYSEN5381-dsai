name: Deploy FastAPI to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - '05_hackathon/congestion_tracker/api/**'
      - '.github/workflows/deploy-fastapi.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14.2'

      - name: Generate manifest.json (FastAPI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install rsconnect-python
          rsconnect write-manifest api --entrypoint fastapi_app:app 05_hackathon/congestion_tracker/api

      - name: Pin manifest Python to 3.14.2
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("05_hackathon/congestion_tracker/api/manifest.json")
          if not p.exists():
              raise SystemExit("manifest.json not found after write-manifest")
          d = json.loads(p.read_text(encoding="utf-8"))
          d.setdefault("python", {}).setdefault("version", "3.14.2")
          d["python"]["version"] = "3.14.2"
          p.write_text(json.dumps(d, indent=2) + "\n", encoding="utf-8")
          print("Pinned manifest python.version to", d["python"]["version"])
          print("metadata.appmode:", d.get("metadata", {}).get("appmode"))
          print("metadata.entrypoint:", d.get("metadata", {}).get("entrypoint"))
          PY

      - name: "Debug: show API dir + manifest"
        run: |
          ls -la 05_hackathon/congestion_tracker/api
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("05_hackathon/congestion_tracker/api/manifest.json")
          d = json.loads(p.read_text(encoding="utf-8"))
          print("manifest python.version:", d.get("python", {}).get("version"))
          pm = d.get("python", {}).get("package_manager", {})
          print("manifest package_manager:", pm.get("name"), pm.get("version"), pm.get("package_file"))
          PY

      - name: Publish to Posit Connect
        uses: rstudio/actions/connect-publish@main
        env:
          # If you add these as GitHub repo secrets, Connect will set them as runtime env vars.
          CONNECT_ENV_SET_SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          CONNECT_ENV_SET_SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          CONNECT_ENV_SET_SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          CONNECT_ENV_SET_SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          CONNECT_ENV_SET_SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CONNECT_ENV_SET_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONNECT_ENV_SET_OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: 05_hackathon/congestion_tracker/api/:city-congestion-tracker-api
          force: false
          show-logs: true

