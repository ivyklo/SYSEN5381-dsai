name: Deploy Shiny Python App to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - '05_hackathon/congestion_tracker/dashboard/**'
      - '.github/workflows/deploy-shinypy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set dashboard runtime env
        shell: bash
        run: |
          BASE="${{ secrets.CONNECT_SERVER }}"
          BASE="${BASE%/}"
          echo "CONNECT_ENV_SET_CONGESTION_API_URL=${BASE}/city-congestion-tracker-api" >> "$GITHUB_ENV"

      - name: Publish to Posit Connect
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: 05_hackathon/congestion_tracker/dashboard/:city-congestion-tracker-dashboard
          force: false
          show-logs: true
